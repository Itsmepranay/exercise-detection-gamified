<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboards - Exercise Competition Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Leaderboards</h1>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </header>

        <div class="section">
            <h2>Filter Options</h2>
            <select id="exercise-select">
                <option value="">Loading exercises...</option>
            </select>
            <select id="period-select">
                <option value="all_time">All Time</option>
                <option value="weekly">This Week</option>
                <option value="daily">Today</option>
            </select>
            <button onclick="loadLeaderboard()">Update</button>
        </div>

        <div class="section">
            <h2>Leaderboard</h2>
            <div id="leaderboard-content">
                <p>Select an exercise and period to view leaderboard</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/leaderboard.js"></script>
    <script>
        checkAuth();

        // Load exercises
        async function loadExercises() {
            try {
                const exercises = await listExercises();
                const select = document.getElementById('exercise-select');
                select.innerHTML = '<option value="">Select an exercise...</option>';
                exercises.forEach(ex => {
                    const option = document.createElement('option');
                    option.value = ex.id;
                    option.textContent = ex.display_name;
                    select.appendChild(option);
                });
            } catch (error) {
                alert('Error loading exercises: ' + error.message);
            }
        }

        async function loadLeaderboard() {
            const exerciseId = parseInt(document.getElementById('exercise-select').value);
            const period = document.getElementById('period-select').value;

            if (!exerciseId) {
                alert('Please select an exercise');
                return;
            }

            try {
                const data = await getLeaderboard(exerciseId, period);
                displayLeaderboard(data);
            } catch (error) {
                alert('Error loading leaderboard: ' + error.message);
            }
        }

        function displayLeaderboard(data) {
            const content = document.getElementById('leaderboard-content');
            const leaderboard = data.leaderboard;

            if (leaderboard.length === 0) {
                content.innerHTML = '<p>No entries yet</p>';
                return;
            }

            const userId = parseInt(localStorage.getItem('userId'));
            const html = `
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Username</th>
                            <th>Best Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${leaderboard.map(entry => `
                            <tr class="${entry.user_id === userId ? 'highlight' : ''}">
                                <td>${entry.rank}</td>
                                <td>${entry.username}</td>
                                <td>${entry.best_score}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            content.innerHTML = html;
        }

        loadExercises();
    </script>
</body>
</html>
