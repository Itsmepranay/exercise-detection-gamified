<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercises — RepTrack</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">RepTrack</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="exercise.html" class="active">Exercises</a></li>
    <li><a href="challenges.html">Challenges</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
    <li><a href="profile.html">Profile</a></li>
  </ul>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span id="nav-username"></span>
    </div>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-header fade-up">
    <div>
      <div class="page-title">Upload Exercise</div>
      <div class="page-subtitle">Submit a video to get your form score</div>
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="card fade-up fade-up-1 mb-16" style="max-width:560px">
    <div class="card-title">Session Setup</div>

    <div class="form-group">
      <label class="form-label">Exercise Type</label>
      <select id="exercise-select">
        <option value="">Loading exercises...</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Video File</label>
      <input type="file" id="video-input" accept="video/*">
    </div>

    <button id="upload-btn" class="btn btn-primary" onclick="uploadVideo()" disabled style="width:100%">
      Upload &amp; Analyse →
    </button>
  </div>

  <!-- PROCESSING -->
  <div id="processing-section" class="hidden" style="max-width:560px">
    <div class="processing-box fade-up">
      <h3>Analysing your video…</h3>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p class="text-muted" style="margin-top:8px;font-size:13px">MediaPipe is extracting pose landmarks — this may take a moment</p>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-section" class="hidden" style="max-width:560px">
    <div class="result-card fade-up">
      <h3>Session Complete</h3>
      <div class="result-grid" id="results-grid"></div>
      <div id="results-actions" class="flex gap-8 flex-wrap"></div>
    </div>
    <div id="submit-feedback"></div>
  </div>

</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  checkAuth();

  const urlParams         = new URLSearchParams(window.location.search);
  const preselectedEx     = urlParams.get('exercise');
  const pendingChallengeId = urlParams.get('challenge');

  document.getElementById('exercise-select').addEventListener('change', updateBtn);
  document.getElementById('video-input').addEventListener('change', updateBtn);

  function updateBtn() {
    const ex    = document.getElementById('exercise-select').value;
    const video = document.getElementById('video-input').files[0];
    document.getElementById('upload-btn').disabled = !ex || !video;
  }

  async function loadExercises() {
    try {
      const exercises = await listExercises();
      const sel = document.getElementById('exercise-select');
      sel.innerHTML = '<option value="">Select an exercise…</option>';
      exercises.forEach(ex => {
        const opt = document.createElement('option');
        opt.value = ex.id;
        opt.textContent = ex.display_name;
        sel.appendChild(opt);
      });
      if (preselectedEx) { sel.value = preselectedEx; updateBtn(); }
    } catch (e) { console.error('Error loading exercises:', e); }
  }

  async function uploadVideo() {
    const exerciseId = parseInt(document.getElementById('exercise-select').value);
    const videoFile  = document.getElementById('video-input').files[0];
    const userId     = parseInt(localStorage.getItem('userId'));
    if (!exerciseId || !videoFile || !userId) return;

    document.getElementById('processing-section').classList.remove('hidden');
    document.getElementById('results-section').classList.add('hidden');
    document.getElementById('upload-btn').disabled = true;

    let progress = 0;
    const interval = setInterval(() => {
      progress = Math.min(progress + 8, 90);
      document.getElementById('progress-fill').style.width = progress + '%';
    }, 500);

    try {
      const session = await uploadExerciseVideo(userId, exerciseId, videoFile);
      clearInterval(interval);
      document.getElementById('progress-fill').style.width = '100%';
      setTimeout(() => showResults(session), 400);
    } catch (err) {
      clearInterval(interval);
      document.getElementById('processing-section').classList.add('hidden');
      document.getElementById('upload-btn').disabled = false;
      alert('Error processing video: ' + err.message);
    }
  }

  function showResults(session) {
    document.getElementById('processing-section').classList.add('hidden');
    document.getElementById('results-section').classList.remove('hidden');

    localStorage.setItem('lastSessionId', session.id);

    const scoreClass = session.score >= 80 ? 'accent' : session.score >= 50 ? 'yellow' : '';

    document.getElementById('results-grid').innerHTML = `
      <div class="result-metric">
        <div class="result-metric-label">Form Score</div>
        <div class="result-metric-value ${scoreClass}">${session.score}</div>
      </div>
      <div class="result-metric">
        <div class="result-metric-label">Duration</div>
        <div class="result-metric-value">${session.duration_seconds ? session.duration_seconds.toFixed(1) + 's' : '—'}</div>
      </div>
      <div class="result-metric">
        <div class="result-metric-label">Errors</div>
        <div class="result-metric-value">${session.error_count}</div>
      </div>`;

    document.getElementById('results-actions').innerHTML = `
      <a href="exercise.html" class="btn btn-outline">New Session</a>
      <a href="challenges.html" class="btn btn-ghost">Submit to Challenge</a>`;

    if (pendingChallengeId) {
      autoSubmit(parseInt(pendingChallengeId), session.id);
    }
  }

  async function autoSubmit(challengeId, sessionId) {
    try {
      await submitChallengeSession(challengeId, sessionId);
      localStorage.removeItem('pendingChallengeId');
      localStorage.removeItem('pendingExerciseId');
      document.getElementById('submit-feedback').innerHTML = `
        <div class="alert alert-success mt-16">Session submitted to challenge! <a href="challenges.html" style="text-decoration:underline">View challenge →</a></div>`;
    } catch (err) {
      document.getElementById('submit-feedback').innerHTML = `
        <div class="alert alert-error mt-16">Could not auto-submit: ${err.message}</div>`;
    }
  }

  loadExercises();
</script>
</body>
</html>
