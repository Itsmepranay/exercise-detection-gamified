<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenges — RepTrack</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">RepTrack</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="exercise.html">Exercises</a></li>
    <li><a href="challenges.html" class="active">Challenges</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
    <li><a href="profile.html">Profile</a></li>
  </ul>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span id="nav-username"></span>
    </div>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-header fade-up">
    <div>
      <div class="page-title">Challenges</div>
      <div class="page-subtitle">Head-to-head form competitions</div>
    </div>
  </div>

  <!-- CREATE CHALLENGE -->
  <div class="card fade-up fade-up-1 mb-16" style="max-width:560px">
    <div class="card-title">New Challenge</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="form-group" style="margin:0">
        <label class="form-label">Exercise</label>
        <select id="challenge-exercise-select"><option value="">Loading…</option></select>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Opponent</label>
        <select id="challenge-user-select"><option value="">Loading…</option></select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="createChallenge()">Send Challenge →</button>
    <div id="create-feedback"></div>
  </div>

  <!-- PENDING -->
  <div class="fade-up fade-up-2">
    <div class="section-heading">Pending <span class="badge badge-yellow" style="vertical-align:middle" id="badge-pending"></span></div>
    <div id="pending-challenges"><div class="empty-state"><strong>All clear</strong>No pending challenges</div></div>
  </div>

  <!-- ACTIVE -->
  <div class="fade-up fade-up-3 mt-24">
    <div class="section-heading">Active <span class="badge badge-orange" style="vertical-align:middle" id="badge-active"></span></div>
    <div id="active-challenges"><div class="empty-state"><strong>All clear</strong>No active challenges</div></div>
  </div>

  <!-- COMPLETED -->
  <div class="fade-up fade-up-4 mt-24">
    <div class="section-heading">Completed <span class="badge badge-green" style="vertical-align:middle" id="badge-completed"></span></div>
    <div id="completed-challenges"><div class="empty-state"><strong>Nothing yet</strong>Finish your first challenge</div></div>
  </div>

  <!-- REJECTED -->
  <div class="fade-up mt-24">
    <div class="section-heading">Rejected</div>
    <div id="rejected-challenges"><div class="empty-state"><strong>Nothing here</strong></div></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  checkAuth();

  async function loadData() {
    await Promise.all([loadExercises(), loadUsers(), loadChallenges()]);
  }

  async function loadExercises() {
    try {
      const exercises = await listExercises();
      const sel = document.getElementById('challenge-exercise-select');
      sel.innerHTML = '<option value="">Select exercise…</option>';
      exercises.forEach(ex => {
        const o = document.createElement('option');
        o.value = ex.id; o.textContent = ex.display_name; sel.appendChild(o);
      });
    } catch {}
  }

  async function loadUsers() {
    try {
      const users = await listUsers();
      const me  = parseInt(localStorage.getItem('userId'));
      const sel = document.getElementById('challenge-user-select');
      sel.innerHTML = '<option value="">Select opponent…</option>';
      users.filter(u => u.id !== me).forEach(u => {
        const o = document.createElement('option');
        o.value = u.id; o.textContent = u.username; sel.appendChild(o);
      });
    } catch {}
  }

  async function createChallenge() {
    const exerciseId = parseInt(document.getElementById('challenge-exercise-select').value);
    const opponentId = parseInt(document.getElementById('challenge-user-select').value);
    const challengerId = parseInt(localStorage.getItem('userId'));
    const fb = document.getElementById('create-feedback');

    if (!exerciseId || !opponentId) {
      fb.innerHTML = '<div class="alert alert-error mt-8">Select both an exercise and an opponent.</div>';
      return;
    }
    try {
      await createChallengeAPI(challengerId, opponentId, exerciseId);
      fb.innerHTML = '<div class="alert alert-success mt-8">Challenge sent!</div>';
      loadChallenges();
    } catch (e) {
      fb.innerHTML = `<div class="alert alert-error mt-8">${e.message}</div>`;
    }
  }

  async function loadChallenges() {
    const userId = parseInt(localStorage.getItem('userId'));
    try {
      const all = await getUserChallenges(userId);
      renderGroup(all.filter(c => c.status === 'pending'),   'pending-challenges',   'badge-pending',   userId);
      renderGroup(all.filter(c => c.status === 'active'),    'active-challenges',    'badge-active',    userId);
      renderGroup(all.filter(c => c.status === 'completed'), 'completed-challenges', 'badge-completed', userId);
      renderGroup(all.filter(c => c.status === 'rejected'),  'rejected-challenges',  null,              userId);
    } catch {}
  }

  function renderGroup(items, containerId, badgeId, userId) {
    if (badgeId) {
      const b = document.getElementById(badgeId);
      if (b) b.textContent = items.length || '';
    }
    const el = document.getElementById(containerId);
    if (!items.length) return; // keep empty state

    el.innerHTML = items.map(c => {
      const statusClass = `challenge-${c.status}`;

      let actions = '';
      if (c.status === 'pending') {
        if (c.opponent_id === userId) {
          actions = `
            <button class="btn btn-sm btn-primary" onclick="acceptCh(${c.id})">Accept</button>
            <button class="btn btn-sm btn-danger" onclick="rejectCh(${c.id})">Reject</button>`;
        } else {
          actions = `<span class="badge badge-yellow">Awaiting response</span>`;
        }
      } else if (c.status === 'active') {
        actions = `<a href="exercise.html?exercise=${c.exercise_id}&challenge=${c.id}" class="btn btn-sm btn-primary">Compete →</a>`;
      } else if (c.status === 'completed') {
        actions = `
          <span class="badge badge-green">${c.winner ? 'Winner: ' + c.winner.username : 'Tied'}</span>
          <button class="btn btn-sm btn-ghost" onclick="toggleComp(${c.id})">Compare</button>`;
      } else if (c.status === 'rejected') {
        actions = `<span class="badge badge-red">Rejected</span>`;
      }

      const compPanel = c.status === 'completed' ? `
        <div id="comp-${c.id}" class="comparison-panel hidden" style="margin-top:12px;width:100%">
          ${renderComparison(c)}
        </div>` : '';

      return `
        <div class="challenge-item ${statusClass}" style="flex-wrap:wrap">
          <div class="challenge-meta">
            <div class="challenge-exercise">${c.exercise.display_name}</div>
            <div class="challenge-players">${c.challenger.username} vs ${c.opponent.username}</div>
          </div>
          <div class="challenge-actions">${actions}</div>
          ${compPanel}
        </div>`;
    }).join('');
  }

  function renderComparison(c) {
    if (!c.sessions || !c.sessions.length) return '<p class="text-muted">No sessions submitted yet.</p>';
    const cSes = c.sessions.filter(s => s.user_id === c.challenger_id);
    const oSes = c.sessions.filter(s => s.user_id === c.opponent_id);
    const best = arr => arr.reduce((m, s) => (!m || s.score > m.score) ? s : m, null);
    const cb = best(cSes), ob = best(oSes);
    const diff = cb && ob ? cb.score - ob.score : 0;

    return `
      <div class="vs-row">
        <div>
          <div class="vs-label">${c.challenger.username}</div>
          <div class="vs-player">${cb ? cb.score : '—'}</div>
          <div class="text-muted">${cb ? cb.error_count + ' errors' : ''}</div>
        </div>
        <div class="vs-divider">VS</div>
        <div style="text-align:right">
          <div class="vs-label">${c.opponent.username}</div>
          <div class="vs-player">${ob ? ob.score : '—'}</div>
          <div class="text-muted">${ob ? ob.error_count + ' errors' : ''}</div>
        </div>
      </div>
      ${cb && ob ? `<p style="margin-top:10px;font-size:12px;font-weight:600;color:var(--gray3)">
        ${diff > 0 ? c.challenger.username + ' leads by ' + diff : diff < 0 ? c.opponent.username + ' leads by ' + Math.abs(diff) : 'Tied'}
      </p>` : ''}`;
  }

  function toggleComp(id) {
    const el = document.getElementById(`comp-${id}`);
    if (el) el.classList.toggle('hidden');
  }

  async function acceptCh(id) {
    try { await acceptChallengeAPI(id); loadChallenges(); }
    catch (e) { alert(e.message); }
  }
  async function rejectCh(id) {
    if (!confirm('Reject this challenge?')) return;
    try { await rejectChallengeAPI(id); loadChallenges(); }
    catch (e) { alert(e.message); }
  }

  loadData();
</script>
</body>
</html>
